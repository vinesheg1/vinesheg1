name: Update Dual Credly Badges

on:
  schedule:
    # Runs at midnight on the 1st and 16th of every month
    - cron: '0 0 1,16 * *'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  sync-badges:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests

      - name: Fetch and Inject Badges
        env:
          PERSONAL_USER: 'vinesh-eg'
          ORG_USER: 'vinesh-eg.09e7ae76'
        run: |
          python - << 'EOF'
          import os
          import requests
          import re

          def get_combined_skills(usernames):
              skills_set = set()
              for username in usernames:
                  if not username: continue
                  url = f"https://credly.com/users/{username}/badges.json"
                  try:
                      response = requests.get(url, timeout=10)
                      if response.status_code == 200:
                          data = response.json().get('data', [])
                          for badge in data:
                              tags = badge.get('badge_template', {}).get('tags', [])
                              for skill in tags:
                                  skills_set.add(skill)
                  except Exception as e:
                      print(f"Error fetching {username}: {e}")
              
            # Replace the old loop with this fast text-based approach
          html_output = '<div style="display: flex; flex-wrap: wrap; gap: 10px;">\n'
          for skill in sorted(skills_set):
              # Using a styled <span> instead of an image
              html_output += f'  <span style="background: #e1f5fe; color: #0277bd; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; border: 1px solid #b3e5fc;">{skill}</span>\n'
          html_output += '</div>'
              return html_output

          with open('README.md', 'r', encoding='utf-8') as file:
              readme = file.read()

          all_skills_html = get_combined_skills([os.getenv('PERSONAL_USER'), os.getenv('ORG_USER')])

          # Ensure the regex matches your README anchors exactly
          readme = re.sub(r"()(.*?)()", f"\\1\n{all_skills_html}\n\\3", readme, flags=re.DOTALL)

          with open('README.md', 'w', encoding='utf-8') as file:
              file.write(readme)
          EOF

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated Sync: Updated Credly Skills" && git push)
