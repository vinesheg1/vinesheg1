name: Update Dual Credly Badges

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 1: Fetch Personal Badges into the "credly-personal" section
      - name: Fetch Personal Badges
        uses: pemtajo/badge-readme@main
        with:
          credly_user: 'vinesh-eg'
          id: 'credly-personal' # <-- Maps directly to <!-- START_SECTION:credly-personal -->

      # Step 2: Fetch Corporate Badges into the "credly-org" section
      - name: Fetch Corporate Badges
        uses: pemtajo/badge-readme@main
        with:
          credly_user: 'vinesh-eg.09e7ae76'
          id: 'credly-org' # <-- Maps directly to <!-- START_SECTION:credly-org -->
