name: Update Dual Credly Badges

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 1: Fetch Personal Badges
      - name: Fetch Personal Badges
        uses: jd-35656/readme-credly-badges@v1
        with:
          credly_username: 'vinesh-eg'
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # Step 2: Fetch Org Badges (Uses custom tags to avoid overwriting step 1)
      - name: Fetch Organization Badges
        uses: jd-35656/readme-credly-badges@v1
        with:
          credly_username: 'vinesh-eg.09e7ae76'
          github_token: ${{ secrets.GITHUB_TOKEN }}
